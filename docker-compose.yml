
# ─── Local Development Infrastructure ────────────────────────────────────────
#
# This file starts the services needed to run FitLevelUp locally.
#
# What's covered here:
#     MongoDB 7 (with Replica Set — required for transactions)
#
# What's NOT covered here (must be configured separately):
#     Redis (SSE real-time layer) — the app uses @upstash/redis, which talks
#       to Upstash's cloud REST API, NOT a raw TCP Redis container. A plain
#       redis:alpine container is NOT compatible with this SDK.
#
#       → To enable SSE locally, add these to your .env.local:
#           UPSTASH_REDIS_REST_URL=<your Upstash REST URL>
#           UPSTASH_REDIS_REST_TOKEN=<your Upstash REST token>
#
#       → Get free credentials at: https://console.upstash.com/
#       → If these vars are missing, SSE events will silently fail (no crash).
#
# ─────────────────────────────────────────────────────────────────────────────

services:
  mongodb:
    image: mongo:7.0
    container_name: fitlevelup-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    # To support MongoDB Transactions locally, we MUST run as a Replica Set.
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    healthcheck:
      test: echo "rs.status().ok || rs.initiate({_id:'rs0',members:[{_id:0,host:'127.0.0.1:27017'}]})" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  mongodb_data:
