version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: fitlevelup-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    # To support MongoDB Transactions locally, we MUST run as a Replica Set.
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    healthcheck:
      test: echo "rs.status().ok || rs.initiate({_id:'rs0',members:[{_id:0,host:'127.0.0.1:27017'}]})" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  mongodb_data:
